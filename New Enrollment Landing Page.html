<!DOCTYPE html>
<html lang="en" style="background:#0d1117;">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0d1117" />
  <title>Student Registration | Ceramic Academy</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold: #c9a84c;
      --gold-light: #f0d080;
      --gold-dark: #9a7a30;
      --dark: #0d1117;
      --dark2: #141b26;
      --text: #e8dfc8;
      --text-muted: #8a9ab0;
      --red: #e05c5c;
      --green: #4caf82;
      --border: rgba(201,168,76,0.2);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html { background:#0d1117 !important; }
    body {
      font-family:'DM Sans',sans-serif;
      background:#0d1117 !important;
      color:var(--text);
      min-height:100vh;
      overflow-x:hidden;
    }


    /* BG ORBS */
    .bg-canvas { position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none; }
    .bg-orb { position:absolute;border-radius:50%;filter:blur(80px);opacity:0.18;animation:drift 12s ease-in-out infinite alternate; }
    .bg-orb:nth-child(1){width:600px;height:600px;background:#c9a84c;top:-200px;left:-200px;animation-delay:0s;}
    .bg-orb:nth-child(2){width:400px;height:400px;background:#2a4a7a;bottom:-100px;right:-100px;animation-delay:4s;}
    .bg-orb:nth-child(3){width:300px;height:300px;background:#c9a84c;top:40%;left:60%;animation-delay:8s;}
    @keyframes drift{from{transform:translate(0,0)scale(1);}to{transform:translate(30px,40px)scale(1.1);}}


    /* HEADER */
    header{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:18px 40px;background:rgba(13,17,23,0.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);}
    .logo-wrap{display:flex;align-items:center;gap:14px;}
    .logo-text{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;color:var(--gold);letter-spacing:0.03em;}
    .logo-text span{color:var(--text);font-weight:300;}
    .header-badge{background:linear-gradient(135deg,var(--gold-dark),var(--gold));color:var(--dark);font-size:0.75rem;font-weight:600;padding:6px 14px;border-radius:20px;text-transform:uppercase;}


    /* HERO */
    .hero{position:relative;z-index:5;text-align:center;padding:70px 20px 50px;}
    .hero-tag{display:inline-block;background:rgba(201,168,76,0.12);border:1px solid var(--border);color:var(--gold);font-size:0.78rem;font-weight:600;padding:8px 20px;border-radius:30px;margin-bottom:24px;}
    .hero h1{font-family:'Playfair Display',serif;font-size:clamp(2.4rem,6vw,4rem);font-weight:900;line-height:1.15;color:#fff;}
    .hero h1 em{font-style:normal;background:linear-gradient(90deg,var(--gold-light),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .hero p{color:var(--text-muted);font-size:1.05rem;margin-top:14px;max-width:520px;margin-left:auto;margin-right:auto;line-height:1.7;}


    /* FORM CARD */
    .form-container{position:relative;z-index:5;max-width:720px;margin:0 auto 60px;padding:0 20px;}
    .form-card{background:rgba(20,27,38,0.9);border:1px solid var(--border);border-radius:24px;padding:44px 44px 48px;backdrop-filter:blur(20px);box-shadow:0 30px 80px rgba(0,0,0,0.5);position:relative;overflow:hidden;}
    .form-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--gold),var(--gold-light),var(--gold),transparent);}
    .form-card h2{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700;color:#fff;margin-bottom:6px;}


    /* INPUT STYLES */
    .field-row{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
    @media(max-width:560px){.field-row{grid-template-columns:1fr;}}
    .field-group{margin-bottom:22px;}
    .field-group label{display:block;font-size:0.82rem;font-weight:600;color:var(--gold);text-transform:uppercase;margin-bottom:8px;}
    .field-group input, .field-group select {width:100%;background:rgba(255,255,255,0.04);border:1.5px solid rgba(201,168,76,0.2);border-radius:12px;color:var(--text);padding:13px 16px;outline:none;transition:all 0.25s;}
    .field-group input:focus, .field-group select:focus {border-color:var(--gold);background:rgba(201,168,76,0.06);box-shadow:0 0 0 3px rgba(201,168,76,0.1);}
    
    /* Error State */
    .field-group input.invalid, .field-group select.invalid, .select-display.invalid, .upload-zone.invalid {
        border-color: var(--red) !important;
        background: rgba(224, 92, 92, 0.05) !important;
    }


    /* DISTRICT SEARCH */
    .dist-wrapper{position:relative;}
    .dist-search-box{display:none;position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--dark2);border:1.5px solid var(--gold);border-radius:12px;overflow:hidden;z-index:300;box-shadow:0 16px 40px rgba(0,0,0,0.6);max-height:240px;flex-direction:column;}
    .dist-search-box.open{display:flex;}
    .dist-search-input-wrap{padding:10px 12px;border-bottom:1px solid var(--border);}
    .dist-search-input-wrap input{background:none;border:none;color:var(--text);width:100%;outline:none;}
    .dist-list{overflow-y:auto;flex:1;}
    .dist-item{padding:10px 16px;cursor:pointer;font-size:0.9rem;}
    .dist-item:hover{background:rgba(201,168,76,0.12);color:var(--gold);}
    .select-display{width:100%;background:rgba(255,255,255,0.04);border:1.5px solid rgba(201,168,76,0.2);border-radius:12px;padding:13px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}


    /* UPLOAD ZONE */
    .upload-zone{border:2px dashed rgba(201,168,76,0.3);border-radius:14px;padding:26px 20px;text-align:center;background:rgba(255,255,255,0.02);}
    .upload-zone:hover{border-color:var(--gold);background:rgba(201,168,76,0.06);}
    .upload-actions{display:flex;gap:10px;justify-content:center;margin-top:14px;}
    .upload-btn{position:relative;background:rgba(201,168,76,0.1);border:1px solid var(--border);color:var(--gold);border-radius:10px;padding:8px 18px;font-size:0.82rem;font-weight:600;cursor:pointer;}
    .upload-btn input{position:absolute;inset:0;opacity:0;cursor:pointer;}
    .file-preview{display:none;margin-top:12px;background:rgba(201,168,76,0.08);border:1px solid var(--border);border-radius:10px;padding:12px 16px;align-items:center;gap:12px;}
    .file-preview.show{display:flex;}


    /* BUTTONS */
    .submit-btn{width:100%;background:linear-gradient(135deg,var(--gold-dark),var(--gold),var(--gold-light));color:var(--dark);border:none;border-radius:14px;font-size:1rem;font-weight:700;padding:16px;cursor:pointer;margin-top:10px;transition:all 0.3s;}
    .submit-btn:hover{transform:translateY(-2px);box-shadow:0 14px 36px rgba(201,168,76,0.4);}
    .submit-btn:disabled{opacity:0.6;cursor:not-allowed;}
    .btn-spinner{display:none;width:20px;height:20px;border:3px solid rgba(0,0,0,0.1);border-top-color:var(--dark);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto;}
    .btn-spinner.show{display:block;}
    .btn-text.hide{display:none;}
    @keyframes spin{to{transform:rotate(360deg);}}


    /* TOAST */
    .toast{position:fixed;top:24px;right:24px;background:var(--dark2);border:1px solid var(--green);border-radius:14px;padding:20px;z-index:9999;transform:translateX(150%);transition:transform 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);max-width:350px;box-shadow:0 10px 30px rgba(0,0,0,0.5);}
    .toast.show{transform:translateX(0);}
    .toast.toast-error{border-color:var(--red);}
    .toast-title { font-weight: 700; display: block; margin-bottom: 4px; color: #fff; }
    .toast-body { font-size: 0.85rem; color: var(--text-muted); line-height: 1.4; }


    footer{text-align:center;padding:24px;color:var(--text-muted);font-size:0.82rem;}
  </style>
</head>
<body>


<div class="bg-canvas"><div class="bg-orb"></div><div class="bg-orb"></div><div class="bg-orb"></div></div>


<div class="toast" id="toast">
    <span class="toast-title" id="toastTitle">Success!</span>
    <span class="toast-body" id="toastMsg">Action completed.</span>
</div>


<header>
  <div class="logo-wrap">
    <div class="logo-text">Ceramic <span>Academy</span></div>
  </div>
  <div class="header-badge">Enrolment Portal</div>
</header>


<section class="hero">
  <div class="hero-tag">✦ Official Portal</div>
  <h1>Shape Your<br/><em>Future Today</em></h1>
  <p>Fill in all details and upload your 12th Board Marksheet to proceed.</p>
</section>


<div class="form-container">
  <div class="form-card">
    <h2>Registration Form</h2>
    <form id="regForm" novalidate>
      <div class="field-row">
        <div class="field-group">
          <label>Full Name *</label>
          <input type="text" id="name" data-name="Full Name" placeholder="Enter Full Name" required />
        </div>
        <div class="field-group">
          <label>Father's Name *</label>
          <input type="text" id="fatherName" data-name="Father's Name" placeholder="Father's Name" required />
        </div>
      </div>


      <div class="field-group">
        <label>Mobile Number *</label>
        <input type="tel" id="mobile" data-name="Mobile Number" placeholder="10-digit number" maxlength="10" required />
      </div>


      <div class="field-group">
        <label>District *</label>
        <div class="dist-wrapper" id="distWrapper">
          <div class="select-display" id="distDisplay" data-name="District">
            <span id="distDisplayText">Select District</span>
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
          <input type="hidden" id="distValue" required />
          <div class="dist-search-box" id="distBox">
            <div class="dist-search-input-wrap"><input type="text" id="distSearch" placeholder="Search..." autocomplete="off" /></div>
            <div class="dist-list" id="distList"></div>
          </div>
        </div>
      </div>


      <div class="field-row">
        <div class="field-group">
          <label>12th Year *</label>
          <select id="passingYear" data-name="Passing Year" required>
            <option value="" disabled selected>Year</option>
            <option value="2024">2024</option>
            <option value="2025">2025</option>
            <option value="2026">2026</option>
          </select>
        </div>
        <div class="field-group">
          <label>Board *</label>
          <select id="board" data-name="Board" required>
            <option value="" disabled selected>Board</option>
            <option value="CBSE">CBSE</option>
            <option value="RBSE">RBSE</option>
          </select>
        </div>
      </div>


      <div class="field-row">
        <div class="field-group">
          <label>School Name *</label>
          <input type="text" id="school" data-name="School Name" placeholder="School Name" required />
        </div>
        <div class="field-group">
          <label>12th % *</label>
          <input type="text" id="percentage" data-name="Percentage" placeholder="Percentage" required />
        </div>
      </div>


      <div class="field-group">
        <label>12th Marksheet *</label>
        <div class="upload-zone" id="uploadZone" data-name="Marksheet">
          <p>Choose or Drop File</p>
          <div class="upload-actions">
            <label class="upload-btn">Choose File<input type="file" id="admitCard" accept=".pdf,image/*" /></label>
            <label class="upload-btn">Take Photo<input type="file" id="admitCamera" accept="image/*" capture="environment" /></label>
          </div>
        </div>
        <div class="file-preview" id="filePreview">
          <span id="fileName"></span>
          <button type="button" id="fileRemove" style="background:none;border:none;color:var(--red);cursor:pointer;margin-left:10px;">✕</button>
        </div>
      </div>


      <button type="submit" class="submit-btn" id="submitBtn">
        <span class="btn-text" id="btnText">Submit Registration</span>
        <span class="btn-spinner" id="btnSpinner"></span>
      </button>
    </form>
  </div>
</div>


<footer>© 2026 Ceramic Academy | ceramicacademy.in</footer>


<script>
const GOOGLE_SCRIPT_URL = "YOUR_SCRIPT_URL_HERE";


const districts = ["Ajmer","Alwar","Banswara","Baran","Barmer","Bharatpur","Bhilwara","Bikaner","Bundi","Chittorgarh","Churu","Dausa","Dholpur","Dungarpur","Hanumangarh","Jaipur","Jaisalmer","Jalore","Jhalawar","Jhunjhunu","Jodhpur","Karauli","Kota","Nagaur","Pali","Pratapgarh","Rajsamand","Sawai Madhopur","Sikar","Sirohi","Sri Ganganagar","Tonk","Udaipur"].sort();


// District Logic
const distDisplay = document.getElementById('distDisplay');
const distBox = document.getElementById('distBox');
const distSearch = document.getElementById('distSearch');
const distList = document.getElementById('distList');
const distValue = document.getElementById('distValue');


function renderDistricts(q='') {
  const f = q.toLowerCase();
  distList.innerHTML = districts.filter(d => d.toLowerCase().includes(f))
    .map(d => `<div class="dist-item" onclick="selectDistrict('${d}')">${d}</div>`).join('') || '<div class="dist-item">No results</div>';
}


window.selectDistrict = (d) => {
  distValue.value = d;
  document.getElementById('distDisplayText').textContent = d;
  distDisplay.classList.remove('invalid');
  distBox.classList.remove('open');
};


distDisplay.addEventListener('click', (e) => {
  e.stopPropagation();
  distBox.classList.toggle('open');
  if(distBox.classList.contains('open')) distSearch.focus();
});


distSearch.addEventListener('input', e => renderDistricts(e.target.value));
document.addEventListener('click', () => distBox.classList.remove('open'));
renderDistricts();


// File Handling
let selectedFile = null;
const applyFile = (file) => {
  if (file.size > 20 * 1024 * 1024) { alert("File exceeds 20MB limit"); return; }
  selectedFile = file;
  document.getElementById('fileName').textContent = file.name;
  document.getElementById('filePreview').classList.add('show');
  document.getElementById('uploadZone').classList.remove('invalid');
};


document.getElementById('admitCard').addEventListener('change', e => e.target.files[0] && applyFile(e.target.files[0]));
document.getElementById('admitCamera').addEventListener('change', e => e.target.files[0] && applyFile(e.target.files[0]));
document.getElementById('fileRemove').addEventListener('click', () => { selectedFile = null; document.getElementById('filePreview').classList.remove('show'); });


// Toast Function
function showToast(title, msg, isError=false) {
  const t = document.getElementById('toast');
  document.getElementById('toastTitle').textContent = title;
  document.getElementById('toastMsg').textContent = msg;
  t.classList.toggle('toast-error', isError);
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 6000);
}


// Convert File to Base64
const toBase64 = f => new Promise((res, rej) => {
  const r = new FileReader();
  r.onload = () => res(r.result.split(',')[1]);
  r.onerror = rej;
  r.readAsDataURL(f);
});


// FORM SUBMISSION + VALIDATION
document.getElementById('regForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  
  const missingFields = [];
  
  // Clear previous errors
  document.querySelectorAll('.invalid').forEach(el => el.classList.remove('invalid'));


  // Check inputs and selects
  const requiredInputs = ['name', 'fatherName', 'mobile', 'passingYear', 'board', 'school', 'percentage'];
  requiredInputs.forEach(id => {
    const el = document.getElementById(id);
    if (!el.value || el.value.trim() === "") {
        el.classList.add('invalid');
        missingFields.push(el.getAttribute('data-name'));
    }
  });


  // Check District
  if (!distValue.value) {
    distDisplay.classList.add('invalid');
    missingFields.push("District");
  }


  // Check File
  if (!selectedFile) {
    document.getElementById('uploadZone').classList.add('invalid');
    missingFields.push("Marksheet File");
  }


  // If fields are missing, stop and show error
  if (missingFields.length > 0) {
    showToast("Registration Incomplete", "Please provide: " + missingFields.join(", "), true);
    return;
  }


  // Proceed with Submission
  const btn = document.getElementById('submitBtn');
  const btnText = document.getElementById('btnText');
  const spinner = document.getElementById('btnSpinner');


  btn.disabled = true; btnText.classList.add('hide'); spinner.classList.add('show');


  try {
    const fileBase64 = await toBase64(selectedFile);
    const payload = {
      name: document.getElementById('name').value,
      fatherName: document.getElementById('fatherName').value,
      mobile: document.getElementById('mobile').value,
      district: distValue.value,
      passingYear: document.getElementById('passingYear').value,
      board: document.getElementById('board').value,
      school: document.getElementById('school').value,
      percentage: document.getElementById('percentage').value,
      fileName: selectedFile.name,
      fileType: selectedFile.type,
      fileData: fileBase64
    };


    await fetch(GOOGLE_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify(payload)
    });


    showToast("Submission Successful", "Your registration has been recorded.");
    document.getElementById('regForm').reset();
    selectedFile = null;
    document.getElementById('filePreview').classList.remove('show');
    document.getElementById('distDisplayText').textContent = "Select District";


  } catch (err) {
    showToast("Submission Error", "Something went wrong. Please try again.", true);
  } finally {
    btn.disabled = false; btnText.classList.remove('hide'); spinner.classList.remove('show');
  }
});


// Remove error styling as user types
document.querySelectorAll('input, select').forEach(input => {
    input.addEventListener('input', () => input.classList.remove('invalid'));
});
</script>
</body>
</html>
